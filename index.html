<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COZ - متجر القهوة</title>
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <!-- الرأس -->
    <header class="header">
        <div class="container">
            <div class="logo-section">
                <img src="Coz logo.PNG?v=2" alt="COZ Logo" class="logo-img">
                <h1 class="logo-text">COZ</h1>
            </div>
            <nav class="nav">
                <a href="#home">الرئيسية</a>
                <a href="#products" onclick="scrollToProducts()">بدء الطلب</a>
                <div class="menu-btn" onclick="toggleMenu()">
                    <span>القائمة</span>
                </div>
                <a href="#cart" onclick="toggleCart()" class="cart-link">سلة الشراء (<span id="cart-count">0</span>)</a>
            </nav>
        </div>
    </header>

    <!-- القسم الرئيسي -->
    <section id="home" class="hero">
        <div class="hero-content">
            <h1>أهلاً بك في COZ ☕</h1>
            <p>أفضل قهوة بأسعار رائعة</p>
            <button onclick="scrollToProducts()" class="btn-primary">بدء الطلب</button>
        </div>
    </section>

    <!-- المنتجات -->
    <section id="products" class="products">
        <div class="container">
            <h2>قائمة المنتجات</h2>
            <div class="products-grid" id="products-list"></div>
        </div>
    </section>

    <!-- سلة الشراء -->
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="toggleCart()">&times;</span>
            <h2>سلة الشراء</h2>
            <div id="cart-items"></div>
            <div class="cart-summary">
                <h3>الإجمالي: <span id="total">0</span> AED</h3>
                <button onclick="goToCheckout()" class="btn-primary">الدفع</button>
            </div>
        </div>
    </div>

    <!-- قائمة الطلب المبسطة -->
    <div id="menu-modal" class="modal">
        <div class="modal-content menu-modal-content">
            <span class="close" onclick="toggleMenu()">&times;</span>
            <h2>قائمة الطلب</h2>
            <img src="Coz menu.PNG?v=2" alt="Menu" class="menu-image">
        </div>
    </div>

    <!-- صفحة الدفع -->
    <div id="checkout-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeCheckout()">&times;</span>
            <h2>إتمام الطلب</h2>
            <form id="checkout-form">
                <div class="form-group">
                    <label>الاسم الكامل:</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label>رقم الهاتف:</label>
                    <input type="tel" id="phone" required>
                </div>
                <div class="form-group">
                    <label>العنوان:</label>
                    <input type="text" id="address" required>
                </div>
                <div class="form-group">
                    <label>طريقة الدفع:</label>
                    <select id="payment-method" required>
                        <option>اختر طريقة الدفع</option>
                        <option>عند الاستلام</option>
                        <option>Zain Pay</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">تأكيد الطلب</button>
            </form>
        </div>
    </div>

    <!-- متابعة الطلبات -->
    <div id="order-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeOrder()">&times;</span>
            <h2>تفاصيل طلبك</h2>
            <div id="order-details"></div>
        </div>
    </div>

    <script src="script.js?v=2"></script>
</body>
</html>
