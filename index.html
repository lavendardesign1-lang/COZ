<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COZ - متجر القهوة</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <img src="Coz logo.PNG" alt="شعار COZ">
                <h1>COZ</h1>
            </div>
            <nav>
                <button onclick="showHome()">الرئيسية</button>
                <button onclick="showProducts()">الطلب</button>
                <button onclick="showMenu()">القائمة</button>
                <button onclick="showCart()" class="cart-btn">السلة (<span id="cart-count">0</span>)</button>
            </nav>
        </div>
    </header>

    <main>
        <section id="home-section" class="section active">
            <div class="hero">
                <h2>أهلاً بك في COZ ☕</h2>
                <p>أفضل قهوة بأسعار رائعة</p>
                <button onclick="showProducts()" class="btn">ابدأ الطلب</button>
            </div>
        </section>

        <section id="products-section" class="section">
            <div class="container">
                <h2>قائمة المنتجات</h2>
                <div id="products-container"></div>
            </div>
        </section>

        <section id="menu-section" class="section">
            <div class="container menu-container">
                <span onclick="closeMenu()" class="close-btn">&times;</span>
                <img src="Coz menu.PNG" alt="قائمة المنتجات" class="menu-image">
            </div>
        </section>

        <section id="cart-section" class="section">
            <div class="container">
                <span onclick="closeCart()" class="close-btn">&times;</span>
                <h2>سلة الشراء</h2>
                <div id="cart-items"></div>
                <div class="cart-total">
                    <h3>الإجمالي: <span id="total">0</span> AED</h3>
                    <button onclick="goCheckout()" class="btn">الدفع</button>
                </div>
            </div>
        </section>

        <section id="checkout-section" class="section">
            <div class="container">
                <span onclick="closeCheckout()" class="close-btn">&times;</span>
                <h2>إتمام الطلب</h2>
                <form id="checkout-form">
                    <input type="text" id="name" placeholder="الاسم الكامل" required>
                    <input type="tel" id="phone" placeholder="رقم الهاتف" required>
                    <input type="text" id="address" placeholder="العنوان" required>
                    <select id="payment" required>
                        <option>اختر طريقة الدفع</option>
                        <option>عند الاستلام</option>
                        <option>Zain Pay</option>
                    </select>
                    <button type="submit" class="btn">تأكيد الطلب</button>
                </form>
            </div>
        </section>

        <section id="order-section" class="section">
            <div class="container">
                <span onclick="closeOrder()" class="close-btn">&times;</span>
                <div id="order-details"></div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
